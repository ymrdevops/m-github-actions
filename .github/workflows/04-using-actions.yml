name: 04 Using Actions
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - name: checkout code
          uses: actions/checkout@v4
        - name: Printing Dir Structure
          run: ls
        - name: Setup Node
          uses: action/setup-node@v3
          with:
            node-version: '20.x'
        - name: Install Dependencies
          run: npm ci


          